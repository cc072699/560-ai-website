<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 768" font-family="PingFang SC, Microsoft YaHei, Noto Sans SC, sans-serif">
<defs>
  <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#F8FAFC"/><stop offset="100%" stop-color="#EFF3F8"/>
  </linearGradient>
  <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#2563EB"/><stop offset="100%" stop-color="#6366F1"/>
  </linearGradient>
  <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#059669"/><stop offset="100%" stop-color="#10B981"/>
  </linearGradient>
  <filter id="card"><feDropShadow dx="0" dy="2" stdDeviation="6" flood-opacity="0.06"/></filter>
  <filter id="node"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.10"/></filter>
</defs>
<rect width="1024" height="768" fill="url(#bg)"/>

  <text x="512" y="60" text-anchor="middle" font-size="26" font-weight="700" fill="#1E293B">智能平台识别</text>
  <text x="512" y="90" text-anchor="middle" font-size="14" fill="#64748B">自动判断微信支付与支付宝，无感切换解析策略</text>

  <!-- WeChat Pay node -->
  <g filter="url(#node)">
    <rect x="120" y="280" width="240" height="140" rx="16" fill="#FFFFFF" stroke="#E2E8F0"/>
    <rect x="120" y="280" width="240" height="44" rx="16" fill="#07C160"/>
    <rect x="120" y="308" width="240" height="16" fill="#07C160"/>
    <text x="240" y="308" text-anchor="middle" font-size="18" font-weight="700" fill="#FFFFFF">微信支付</text>
    <text x="240" y="350" text-anchor="middle" font-size="13" fill="#475569">微信账单 PDF</text>
    <text x="240" y="375" text-anchor="middle" font-size="12" fill="#94A3B8">时间戳分割法</text>
  </g>

  <!-- Alipay node -->
  <g filter="url(#node)">
    <rect x="664" y="280" width="240" height="140" rx="16" fill="#FFFFFF" stroke="#E2E8F0"/>
    <rect x="664" y="280" width="240" height="44" rx="16" fill="#1677FF"/>
    <rect x="664" y="308" width="240" height="16" fill="#1677FF"/>
    <text x="784" y="308" text-anchor="middle" font-size="18" font-weight="700" fill="#FFFFFF">支付宝</text>
    <text x="784" y="350" text-anchor="middle" font-size="13" fill="#475569">支付宝流水 PDF</text>
    <text x="784" y="375" text-anchor="middle" font-size="12" fill="#94A3B8">逐行分组法</text>
  </g>

  <!-- Recognition engine in center -->
  <g filter="url(#node)">
    <ellipse cx="512" cy="350" rx="80" ry="50" fill="url(#accent)" opacity="0.12"/>
  </g>
  <text x="512" y="340" text-anchor="middle" font-size="32">🔍</text>
  <text x="512" y="365" text-anchor="middle" font-size="13" font-weight="600" fill="#2563EB">自动识别</text>

  <!-- Arrows -->
  <line x1="360" y1="350" x2="432" y2="350" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="6 4"/>
  <line x1="592" y1="350" x2="664" y2="350" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="6 4"/>

  <!-- Result -->
  <rect x="280" y="490" width="464" height="80" rx="14" fill="#FFFFFF" stroke="#DBEAFE" stroke-width="2" filter="url(#card)"/>
  <text x="512" y="522" text-anchor="middle" font-size="15" font-weight="600" fill="#1E40AF">✓ 平台自动识别完成</text>
  <text x="512" y="548" text-anchor="middle" font-size="12" fill="#64748B">根据文件特征自动匹配解析引擎，用户无需手动选择</text>

  <!-- Bottom process steps -->
  <g transform="translate(512,640)">
    <rect x="-220" y="0" width="100" height="36" rx="18" fill="#EFF6FF"/>
    <text x="-170" y="23" text-anchor="middle" font-size="12" font-weight="600" fill="#2563EB">上传文件</text>
    <line x1="-120" y1="18" x2="-80" y2="18" stroke="#CBD5E1" stroke-width="1.5"/>
    <rect x="-80" y="0" width="116" height="36" rx="18" fill="url(#accent)"/>
    <text x="-22" y="23" text-anchor="middle" font-size="12" font-weight="600" fill="#FFFFFF">智能识别</text>
    <line x1="36" y1="18" x2="76" y2="18" stroke="#CBD5E1" stroke-width="1.5"/>
    <rect x="76" y="0" width="100" height="36" rx="18" fill="#F1F5F9"/>
    <text x="126" y="23" text-anchor="middle" font-size="12" font-weight="600" fill="#94A3B8">解析流水</text>
  </g>

</svg>