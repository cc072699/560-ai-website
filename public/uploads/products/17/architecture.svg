<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" font-family="PingFang SC, Microsoft YaHei, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#EEF2F7"/>
    </linearGradient>
    <linearGradient id="box" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F1F5F9"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="1200" height="520" fill="url(#bg)"/>

  <text x="600" y="48" text-anchor="middle" font-size="22" font-weight="700" fill="#0F172A">流水智算 · 四步处理流程</text>
  <text x="600" y="76" text-anchor="middle" font-size="13" fill="#64748B">从原始文件到结构化报告，全程自动化闭环</text>

  <g filter="url(#shadow)">
    <!-- Step 1 -->
    <rect x="60" y="140" width="240" height="200" rx="16" fill="url(#box)" stroke="#E2E8F0" stroke-width="1"/>
    <circle cx="100" cy="180" r="22" fill="url(#accent)"/>
    <text x="100" y="186" text-anchor="middle" font-size="18" font-weight="700" fill="#FFFFFF">1</text>
    <text x="135" y="186" font-size="16" font-weight="700" fill="#0F172A">上传流水文件</text>
    <text x="80" y="230" font-size="12" fill="#475569">支持微信 / 支付宝</text>
    <text x="80" y="252" font-size="12" fill="#475569">PDF / 图片 / 截图</text>
    <text x="80" y="274" font-size="12" fill="#475569">拖拽上传即识别</text>
    <rect x="80" y="290" width="200" height="28" rx="6" fill="#EFF6FF"/>
    <text x="180" y="308" text-anchor="middle" font-size="11" font-weight="600" fill="#2563EB">≈ 1 秒</text>

    <!-- Arrow 1->2 -->
    <path d="M 305 240 L 335 240" stroke="#94A3B8" stroke-width="2" fill="none" stroke-dasharray="4 4"/>
    <polygon points="335,235 345,240 335,245" fill="#94A3B8"/>

    <!-- Step 2 -->
    <rect x="350" y="140" width="240" height="200" rx="16" fill="url(#box)" stroke="#E2E8F0" stroke-width="1"/>
    <circle cx="390" cy="180" r="22" fill="url(#accent)"/>
    <text x="390" y="186" text-anchor="middle" font-size="18" font-weight="700" fill="#FFFFFF">2</text>
    <text x="425" y="186" font-size="16" font-weight="700" fill="#0F172A">智能平台识别</text>
    <text x="370" y="230" font-size="12" fill="#475569">自动判断</text>
    <text x="370" y="252" font-size="12" fill="#475569">微信支付 / 支付宝</text>
    <text x="370" y="274" font-size="12" fill="#475569">无感切换解析策略</text>
    <rect x="370" y="290" width="200" height="28" rx="6" fill="#EFF6FF"/>
    <text x="470" y="308" text-anchor="middle" font-size="11" font-weight="600" fill="#2563EB">≈ 1 秒</text>

    <!-- Arrow 2->3 -->
    <path d="M 595 240 L 625 240" stroke="#94A3B8" stroke-width="2" fill="none" stroke-dasharray="4 4"/>
    <polygon points="625,235 635,240 625,245" fill="#94A3B8"/>

    <!-- Step 3 -->
    <rect x="640" y="140" width="240" height="200" rx="16" fill="url(#box)" stroke="#E2E8F0" stroke-width="1"/>
    <circle cx="680" cy="180" r="22" fill="url(#accent)"/>
    <text x="680" y="186" text-anchor="middle" font-size="18" font-weight="700" fill="#FFFFFF">3</text>
    <text x="715" y="186" font-size="16" font-weight="700" fill="#0F172A">逐笔解析流水</text>
    <text x="660" y="230" font-size="12" fill="#475569">金额 / 对方 / 时间</text>
    <text x="660" y="252" font-size="12" fill="#475569">退款自动识别抵扣</text>
    <text x="660" y="274" font-size="12" fill="#475569">不计收支精准隔离</text>
    <rect x="660" y="290" width="200" height="28" rx="6" fill="#EFF6FF"/>
    <text x="760" y="308" text-anchor="middle" font-size="11" font-weight="600" fill="#2563EB">≈ 8 秒</text>

    <!-- Arrow 3->4 -->
    <path d="M 885 240 L 915 240" stroke="#94A3B8" stroke-width="2" fill="none" stroke-dasharray="4 4"/>
    <polygon points="915,235 925,240 915,245" fill="#94A3B8"/>

    <!-- Step 4 -->
    <rect x="930" y="140" width="240" height="200" rx="16" fill="url(#box)" stroke="#E2E8F0" stroke-width="1"/>
    <circle cx="970" cy="180" r="22" fill="url(#accent)"/>
    <text x="970" y="186" text-anchor="middle" font-size="18" font-weight="700" fill="#FFFFFF">4</text>
    <text x="1005" y="186" font-size="16" font-weight="700" fill="#0F172A">生成统计报告</text>
    <text x="950" y="230" font-size="12" fill="#475569">Markdown 报告秒出</text>
    <text x="950" y="252" font-size="12" fill="#475569">总收入 / 总支出</text>
    <text x="950" y="274" font-size="12" fill="#475569">净差额 / 有效记录数</text>
    <rect x="950" y="290" width="200" height="28" rx="6" fill="#ECFDF5"/>
    <text x="1050" y="308" text-anchor="middle" font-size="11" font-weight="600" fill="#059669">≈ 1 秒</text>
  </g>

  <!-- Bottom summary band -->
  <g>
    <rect x="60" y="380" width="1110" height="100" rx="14" fill="#FFFFFF" stroke="#DBEAFE" stroke-width="1.5"/>
    <text x="600" y="415" text-anchor="middle" font-size="14" font-weight="700" fill="#1E40AF">全流程 ≈ 10 秒</text>
    <text x="600" y="442" text-anchor="middle" font-size="12" fill="#64748B">从原始流水文件到 Markdown 统计报告，全程零人工干预</text>
    <g transform="translate(0,0)">
      <text x="180" y="465" text-anchor="middle" font-size="11" font-weight="600" fill="#2563EB">· 智能识别</text>
      <text x="380" y="465" text-anchor="middle" font-size="11" font-weight="600" fill="#2563EB">· 精准解析</text>
      <text x="580" y="465" text-anchor="middle" font-size="11" font-weight="600" fill="#2563EB">· 退款抵扣</text>
      <text x="780" y="465" text-anchor="middle" font-size="11" font-weight="600" fill="#2563EB">· 一键汇总</text>
      <text x="1000" y="465" text-anchor="middle" font-size="11" font-weight="600" fill="#2563EB">· 本地安全</text>
    </g>
  </g>
</svg>
