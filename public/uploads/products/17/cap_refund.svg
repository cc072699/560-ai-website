  <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#2563EB"/><stop offset="100%" stop-color="#6366F1"/></linearGradient>
  <linearGradient id="grn" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#059669"/><stop offset="100%" stop-color="#10B981"/></linearGradient>
  <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="6" flood-opacity="0.06"/></filter>
