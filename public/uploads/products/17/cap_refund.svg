    <text x="270" y="24" text-anchor="middle" font-size="20" fill="#CBD5E1">→</text>
    <rect x="320" y="0" width="230" height="36" rx="10" fill="#F0FDF4"/><text x="435" y="24" text-anchor="middle" font-size="14" fill="#059669">抵扣后总支出：¥1,000.00</text>
