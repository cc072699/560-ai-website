<rect width="1024" height="768" fill="url(#bg)"/>
<text x="512" y="55" text-anchor="middle" font-size="26" font-weight="700" fill="#1E293B">退款自动抵扣</text><text x="512" y="82" text-anchor="middle" font-size="14" fill="#64748B">智能识别退款 · 自动匹配原支出项 · 杜绝重复计算</text>
