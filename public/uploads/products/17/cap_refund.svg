    <rect x="0" y="50" width="400" height="40" rx="10" fill="#FFF7ED"/><text x="200" y="76" text-anchor="middle" font-size="13" fill="#EA580C">不计收支 · 退款 ¥50.00（来自3月20日支出）</text>
    <rect x="0" y="100" width="400" height="32" rx="8" fill="#FFF1F2"/><text x="200" y="121" text-anchor="middle" font-size="12" fill="#DC2626">更多退款记录自动识别中...</text>
  </g></g>
  <text x="540" y="260" text-anchor="middle" font-size="28" fill="#2563EB">→</text>
  <g filter="url(#sh)"><rect x="560" y="140" width="400" height="200" rx="16" fill="#FFFFFF" stroke="#D1FAE5" stroke-width="2"/>
  <text x="760" y="175" text-anchor="middle" font-size="16" font-weight="700" fill="#059669">自动匹配并扣除</text>
  <line x1="580" y1="190" x2="940" y2="190" stroke="#F1F5F9"/>
  <g transform="translate(590,210)">
    <rect x="0" y="0" width="350" height="40" rx="10" fill="#F0FDF4"/><text x="175" y="26" text-anchor="middle" font-size="13" fill="#059669">匹配成功：原支出¥200 → 抵扣退款¥200</text>
    <rect x="0" y="50" width="350" height="40" rx="10" fill="#F0FDF4"/><text x="175" y="76" text-anchor="middle" font-size="13" fill="#059669">匹配成功：原支出¥50 → 抵扣退款¥50</text>
  </g></g>
