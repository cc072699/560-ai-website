<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2f7"/>
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0f5fb"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.15"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1024" height="1024" fill="url(#bgGrad)"/>

  <text x="512" y="80" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="36" font-weight="700" fill="#0f172a">系统技术架构</text>
  <text x="512" y="118" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" fill="#64748b">智能法律文书批量生成系统 · 数据处理流程</text>

  <g font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="600" fill="#1e293b">

    <g filter="url(#softShadow)">
      <rect x="362" y="180" width="300" height="80" rx="12" fill="url(#nodeGrad)" stroke="#3b82f6" stroke-width="2"/>
      <text x="512" y="218" text-anchor="middle">模板上传</text>
      <text x="512" y="244" text-anchor="middle" font-size="14" font-weight="400" fill="#64748b">Word 模板 + 案件数据</text>
    </g>

    <g filter="url(#softShadow)">
      <rect x="362" y="320" width="300" height="80" rx="12" fill="url(#nodeGrad)" stroke="#3b82f6" stroke-width="2"/>
      <text x="512" y="358" text-anchor="middle">智能解析</text>
      <text x="512" y="384" text-anchor="middle" font-size="14" font-weight="400" fill="#64748b">字段识别 · 变量映射</text>
    </g>

    <g filter="url(#softShadow)">
      <rect x="362" y="460" width="300" height="80" rx="12" fill="url(#nodeGrad)" stroke="#3b82f6" stroke-width="2"/>
      <text x="512" y="498" text-anchor="middle">文书填充</text>
      <text x="512" y="524" text-anchor="middle" font-size="14" font-weight="400" fill="#64748b">智能勾选诉讼请求</text>
    </g>

    <g filter="url(#softShadow)">
      <rect x="362" y="600" width="300" height="80" rx="12" fill="url(#nodeGrad)" stroke="#3b82f6" stroke-width="2"/>
      <text x="512" y="638" text-anchor="middle">违约金核算</text>
      <text x="512" y="664" text-anchor="middle" font-size="14" font-weight="400" fill="#64748b">13档复利精准计算</text>
    </g>

    <g filter="url(#softShadow)">
      <rect x="362" y="740" width="300" height="80" rx="12" fill="url(#nodeGrad)" stroke="#10b981" stroke-width="2"/>
      <text x="512" y="778" text-anchor="middle">整包下载</text>
      <text x="512" y="804" text-anchor="middle" font-size="14" font-weight="400" fill="#64748b">按客户自动归档</text>
    </g>
  </g>

  <g stroke="url(#arrowGrad)" stroke-width="3" fill="none">
    <line x1="512" y1="260" x2="512" y2="320" marker-end="url(#arrowHead)"/>
    <line x1="512" y1="400" x2="512" y2="460" marker-end="url(#arrowHead)"/>
    <line x1="512" y1="540" x2="512" y2="600" marker-end="url(#arrowHead)"/>
    <line x1="512" y1="680" x2="512" y2="740" marker-end="url(#arrowHead)"/>
  </g>

  <defs>
    <marker id="arrowHead" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1d4ed8"/>
    </marker>
  </defs>

  <g font-family="'PingFang SC', 'Microsoft YaHei', sans-serif">
    <circle cx="100" cy="220" r="50" fill="#dbeafe" opacity="0.6"/>
    <text x="100" y="215" text-anchor="middle" font-size="14" fill="#1e40af" font-weight="600">律师</text>
    <text x="100" y="235" text-anchor="middle" font-size="12" fill="#1e40af">用户端</text>

    <circle cx="100" cy="460" r="50" fill="#dbeafe" opacity="0.6"/>
    <text x="100" y="455" text-anchor="middle" font-size="14" fill="#1e40af" font-weight="600">数据</text>
    <text x="100" y="475" text-anchor="middle" font-size="12" fill="#1e40af">解析引擎</text>

    <circle cx="100" cy="780" r="50" fill="#dcfce7" opacity="0.6"/>
    <text x="100" y="775" text-anchor="middle" font-size="14" fill="#166534" font-weight="600">压缩</text>
    <text x="100" y="795" text-anchor="middle" font-size="12" fill="#166534">打包服务</text>

    <g stroke="#94a3b8" stroke-width="1.5" fill="none" stroke-dasharray="4,3">
      <path d="M 150 220 Q 256 220 362 220"/>
      <path d="M 150 460 Q 256 460 362 460"/>
      <path d="M 150 780 Q 256 780 362 780"/>
    </g>
  </g>

  <g font-family="'PingFang SC', 'Microsoft YaHei', sans-serif">
    <rect x="740" y="200" width="240" height="120" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" filter="url(#softShadow)"/>
    <text x="860" y="230" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">核心特性</text>
    <text x="860" y="258" text-anchor="middle" font-size="13" fill="#475569">• 浏览器本地处理</text>
    <text x="860" y="278" text-anchor="middle" font-size="13" fill="#475569">• 模板驱动生成</text>
    <text x="860" y="298" text-anchor="middle" font-size="13" fill="#475569">• 数据完全私有</text>

    <rect x="740" y="360" width="240" height="120" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" filter="url(#softShadow)"/>
    <text x="860" y="390" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">智能能力</text>
    <text x="860" y="418" text-anchor="middle" font-size="13" fill="#475569">• OCR 字段识别</text>
    <text x="860" y="438" text-anchor="middle" font-size="13" fill="#475569">• 自动勾选选项</text>
    <text x="860" y="458" text-anchor="middle" font-size="13" fill="#475569">• 13档利率复利</text>

    <rect x="740" y="520" width="240" height="120" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" filter="url(#softShadow)"/>
    <text x="860" y="550" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">输出格式</text>
    <text x="860" y="578" text-anchor="middle" font-size="13" fill="#475569">• Word .docx</text>
    <text x="860" y="598" text-anchor="middle" font-size="13" fill="#475569">• PDF</text>
    <text x="860" y="618" text-anchor="middle" font-size="13" fill="#475569">• 压缩包 .zip</text>
  </g>

  <g font-family="'PingFang SC', 'Microsoft YaHei', sans-serif">
    <rect x="362" y="880" width="300" height="80" rx="40" fill="#1e40af"/>
    <text x="512" y="912" text-anchor="middle" font-size="20" font-weight="600" fill="#ffffff">100 件案件 · 约 5 分钟</text>
    <text x="512" y="938" text-anchor="middle" font-size="14" fill="#cbd5e1">从上传到交付全流程自动化</text>
  </g>
</svg>
